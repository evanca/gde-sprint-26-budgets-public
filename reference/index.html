<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Cost Control Room</title>
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>
  <header>
    <h1>Agent Cost Control Room</h1>
    <p id="summary" class="summary">Loading…</p>
    <div id="meter" class="meter" role="img" aria-label="Budget usage"></div>
  </header>

  <p id="error" class="error" role="alert" hidden></p>

  <main>
    <table id="ledger" class="ledger">
      <thead>
        <tr>
          <th>#</th><th>Turn</th><th class="num">Tokens</th>
          <th class="num">Cumulative</th><th class="num">Cost</th>
          <th class="num">Tools</th><th class="num">Retries</th><th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
